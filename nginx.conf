# ══════════════════════════════════════════════════════════════
# Nginx Configuration for Skyline Travel SaaS
# Copy to: /etc/nginx/sites-available/skyline
# ══════════════════════════════════════════════════════════════

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

# ── Backend API: api.yourdomain.com ──
server {
    listen 80;
    server_name api.travelagencyweb.com;

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

# ── Frontend: yourdomain.com + *.yourdomain.com (multi-tenant) ──
server {
    listen 80;
    server_name yourdomain.com *.yourdomain.com;

    root /var/www/skyline-frontend/dist;
    index index.html;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Static assets: long cache ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Favicon & robots ──
    location = /favicon.ico { expires 30d; access_log off; }
    location = /robots.txt  { expires 30d; access_log off; }

    # ── SPA fallback: all routes → index.html ──
    location / {
        limit_req zone=general burst=40 nodelay;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ── Block dotfiles ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── Custom domain catch-all (tenant custom domains) ──
server {
    listen 80 default_server;
    server_name _;

    root /var/www/skyline-frontend/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ /\. {
        deny all;
    }
}
